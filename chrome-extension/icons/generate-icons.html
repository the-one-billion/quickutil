<!DOCTYPE html>
<html>
<head><title>Generate QuickUtil Icons</title></head>
<body>
<p>Generating and downloading icons…</p>
<canvas id="c"></canvas>
<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

function makeIcon(size) {
  c.width = size;
  c.height = size;
  const r = size * 0.18; // border radius

  // Background — indigo #6366f1
  ctx.clearRect(0, 0, size, size);
  ctx.fillStyle = "#6366f1";
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, r);
  ctx.fill();

  // Letter "Q" in white
  ctx.fillStyle = "#ffffff";
  ctx.font = `bold ${Math.round(size * 0.58)}px -apple-system, system-ui, sans-serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("Q", size / 2, size / 2 + size * 0.03);

  return new Promise(resolve => c.toBlob(resolve, "image/png"));
}

async function run() {
  for (const size of [16, 32, 48, 128]) {
    const blob = await makeIcon(size);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `icon${size}.png`;
    a.click();
    await new Promise(r => setTimeout(r, 300));
  }
  document.querySelector("p").textContent = "Done! Move the 4 downloaded PNG files into this icons/ folder.";
}

run();
</script>
</body>
</html>
