<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickUtil</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <div id="toolbar">
    <div id="logo">
      <img src="icons/icon32.png" alt="" width="18" height="18" />
      <span>QuickUtil</span>
    </div>
    <div id="toolbar-actions">
      <button id="btn-home" title="Home">⌂</button>
      <button id="btn-tools" title="All tools">⊞</button>
      <button id="btn-open-tab" title="Open in new tab">↗</button>
    </div>
  </div>

  <iframe
    id="frame"
    src="https://quickutil.io"
    allow="clipboard-read; clipboard-write; camera"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
  ></iframe>

  <div id="offline-msg" hidden>
    <p>⚡</p>
    <p>Could not load QuickUtil.</p>
    <p>Make sure you&apos;re connected to the internet.</p>
    <button id="btn-retry">Retry</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
